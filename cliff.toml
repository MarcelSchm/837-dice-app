# git-cliff configuration - generates changelogs from Conventional Commits.
# https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to 837 Dice. Generated from
[Conventional Commits](https://www.conventionalcommits.org) with
[git-cliff](https://git-cliff.org).
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}\
- {{ commit.message | upper_first }}
{% endfor %}\
{% endfor %}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9].*"
sort_commits = "oldest"

commit_parsers = [
    { message = "^feat", group = "<!-- 0 -->🎲 New" },
    { message = "^fix", group = "<!-- 1 -->🩹 Fixed" },
    { message = "^refactor", group = "<!-- 2 -->🔧 Changed" },
    { message = "^docs", group = "<!-- 3 -->📚 Documentation" },
    { message = "^ci", group = "<!-- 4 -->⚙️ CI" },
    { message = "^test", group = "<!-- 5 -->🧪 Tests" },
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore: bump version", skip = true },
    { message = "^chore", group = "<!-- 6 -->🧹 Maintenance" },
    { message = ".*", group = "<!-- 7 -->Other" },
]
