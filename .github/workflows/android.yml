name: Android CI

# Bei jedem Push auf main: Tests + APK bauen (als Artifact herunterladbar).
# Bei einem Version-Tag (v1.0, v1.1, …): zusätzlich ein GitHub-Release mit
# angehängter APK – die kann jeder ohne GitHub-Login herunterladen.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Tests & APK
    runs-on: ubuntu-latest
    permissions:
      contents: write # für das Anlegen von Releases

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: JDK 21 einrichten
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Gradle einrichten (mit Cache)
        uses: gradle/actions/setup-gradle@v4

      - name: gradlew ausführbar machen
        run: chmod +x ./gradlew

      - name: Unit-Tests (Würfelregeln!)
        run: ./gradlew test

      - name: Release-Keystore aus Secret wiederherstellen (falls vorhanden)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
            echo "KEYSTORE_FILE=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"
            echo "Signiere mit Release-Keystore."
          else
            echo "Keine Signing-Secrets gefunden – APK wird debug-signiert."
          fi

      - name: APK bauen
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: APK umbenennen
        run: |
          VERSION="${GITHUB_REF_NAME}"
          cp app/build/outputs/apk/release/app-release.apk \
             "837-wuerfel-${VERSION//\//-}-${GITHUB_SHA::7}.apk"

      - name: APK als Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: 837-wuerfel-apk
          path: 837-wuerfel-*.apk
          retention-days: 90

      - name: GitHub-Release erstellen (nur bei v*-Tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: 837-wuerfel-*.apk
          generate_release_notes: true
          body: |
            🎲 Neue Version der 837-Würfel-App der Gyrosbande!

            **Installation:** APK unten herunterladen, auf dem Handy öffnen und
            die Installation aus unbekannten Quellen erlauben.
