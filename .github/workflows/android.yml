name: Android CI

# On every push to main: run tests and build the APK (downloadable as a
# workflow artifact). On a version tag (v1.0, v1.1, ...): additionally create
# a GitHub release with the APK attached - anyone can download that without
# a GitHub account.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Tests & APK
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to create releases

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          # Full history + tags, needed by git-cliff for release notes
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run unit tests (the dice rules!)
        run: ./gradlew test

      - name: Restore release keystore from secret (if configured)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
            echo "KEYSTORE_FILE=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"
            echo "Signing with the release keystore."
          else
            echo "No signing secrets found - the APK will be debug-signed."
          fi

      - name: Build APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          # Only matches on real "vX.Y[.Z]" tag builds - app/build.gradle.kts
          # derives versionCode/versionName from this. On branch/PR builds
          # ref_name isn't a matching tag, so it falls back to a dev version.
          RELEASE_TAG: ${{ github.ref_name }}
        run: ./gradlew assembleRelease

      - name: Rename APKs
        run: |
          VERSION="${GITHUB_REF_NAME}"
          cp app/build/outputs/apk/release/app-release.apk \
             "837-dice-${VERSION//\//-}-${GITHUB_SHA::7}.apk"
          cp wear/build/outputs/apk/release/wear-release.apk \
             "837-dice-wear-${VERSION//\//-}-${GITHUB_SHA::7}.apk"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: 837-dice-apk
          path: 837-dice-*.apk
          retention-days: 90

      - name: Generate release notes (git-cliff)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          # Only the changes of the tag being released
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Add install instructions to release notes
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cat >> RELEASE_NOTES.md <<'EOF'

          ---
          **Install:** download the APK below, open it on your phone and
          allow installation from unknown sources.

          **Pixel Watch:** the `-wear-` APK is the standalone watch app -
          sideload it onto the watch via `adb install` (developer mode +
          wireless debugging on the watch).
          EOF

      - name: Create GitHub release (v* tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: 837-dice-*.apk
          body_path: RELEASE_NOTES.md

  # After a release tag, regenerate CHANGELOG.md and push it back to main
  # as a bot commit - no manual git-cliff run needed.
  changelog:
    name: Update CHANGELOG.md
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Regenerate CHANGELOG.md
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet CHANGELOG.md; then
            git add CHANGELOG.md
            # chore(release) commits are skipped by cliff.toml on purpose
            git commit -m "chore(release): update CHANGELOG.md for ${GITHUB_REF_NAME}"
            git push origin main
          else
            echo "CHANGELOG.md already up to date."
          fi
