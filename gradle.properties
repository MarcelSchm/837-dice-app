# windows-1252 statt UTF-8: Der Java-Launcher liest Gradles Worker-Argfiles
# mit der nativen Windows-Kodierung. Nur wenn der Daemon dieselbe Kodierung
# schreibt, übersteht das "ü" im Projektpfad die Übergabe (sonst schlagen
# alle Unit-Tests mit ClassNotFoundException fehl).
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=windows-1252
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
# Projektpfad enthält ein "ü" – Pfad-Check von AGP deshalb deaktiviert
android.overridePathCheck=true
