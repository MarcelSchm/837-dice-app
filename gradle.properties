# windows-1252 instead of UTF-8: the Java launcher reads Gradle's worker
# argfiles with the native Windows encoding. Only when the daemon writes the
# same encoding does the "ü" in the local project path survive the handoff
# (otherwise all unit tests fail with ClassNotFoundException on Windows).
# Harmless on Linux/CI.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=windows-1252
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
# The local project path contains a non-ASCII character ("ü") - AGP's path
# check is disabled for that reason.
android.overridePathCheck=true
